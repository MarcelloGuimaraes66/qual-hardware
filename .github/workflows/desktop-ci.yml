name: Desktop CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  native-desktop:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows 11 x64
            os: windows-2025
            platform: windows
          - name: macOS 26 arm64
            os: macos-26
            platform: macos
          - name: Ubuntu 24.04 x64
            os: ubuntu-24.04
            platform: linux
    runs-on: ${{ matrix.os }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npx electron-builder --dir --publish never
      - name: Smoke test packaged desktop
        if: matrix.platform != 'linux'
        run: npm run desktop:smoke
      - name: Smoke test packaged desktop under Xvfb
        if: matrix.platform == 'linux'
        run: xvfb-run --auto-servernum npm run desktop:smoke
      - name: Build and inspect Docker server image
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          docker build --tag qual-hardware:ci .
          docker run --detach --name qual-hardware-ci --publish 127.0.0.1:4178:4178 qual-hardware:ci
          for attempt in {1..30}; do
            status="$(docker inspect --format '{{.State.Health.Status}}' qual-hardware-ci)"
            if [ "$status" = healthy ]; then
              curl --fail --silent http://127.0.0.1:4178/api/health
              exit 0
            fi
            sleep 1
          done
          docker logs qual-hardware-ci
          exit 1
