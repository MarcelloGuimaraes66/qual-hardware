appId: ai.aiquimist.qualhardware
productName: Qual Hardware
copyright: Copyright © 2026 Aiquimist
asar: true
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - "!dist/server/server/index.js"
  - "!dist/server/server/worker.js"
  - contracts/**/*
  - database/**/*
  - package.json
extraResources:
  - from: resources/calibration/runtime-manifest.json
    to: resources/calibration/runtime-manifest.json
  - from: resources/calibration/asset-sources.lock.json
    to: resources/calibration/asset-sources.lock.json
  - from: resources/calibration/runtime-trust.json
    to: resources/calibration/runtime-trust.json
  - from: contracts/calibration-kernel-authority-v1.json
    to: contracts/calibration-kernel-authority-v1.json
  - from: contracts/calibration-pipeline-contract-v1.json
    to: contracts/calibration-pipeline-contract-v1.json

win:
  icon: build/icon.ico
  target:
    - target: portable
      arch:
        - x64
  artifactName: Qual-Hardware-${version}-windows-${arch}-portable.${ext}
  extraResources:
    - from: resources/calibration/win32-x64
      to: resources/calibration/win32-x64

portable:
  # A per-launch extraction directory prevents a second portable bootstrap
  # from replacing the resources (including icudtl.dat) used by the running
  # instance. In electron-builder 26.15.x, `true` omits UNPACK_DIR_NAME and
  # therefore selects NSIS $PLUGINSDIR, which is unique to each launcher.
  # Electron's application lock still rejects the duplicate after extraction.
  unpackDirName: true
  requestExecutionLevel: user

mac:
  icon: build/icon.icns
  category: public.app-category.business
  identity: null
  target:
    - target: dmg
      arch:
        - arm64
  artifactName: Qual-Hardware-${version}-macos-${arch}.${ext}
  extendInfo:
    NSAppTransportSecurity:
      NSAllowsArbitraryLoads: false
      NSAllowsLocalNetworking: true
      NSExceptionDomains:
        127.0.0.1:
          NSIncludesSubdomains: false
          NSTemporaryExceptionAllowsInsecureHTTPLoads: true
  extraResources:
    - from: resources/calibration/darwin-arm64
      to: resources/calibration/darwin-arm64

linux:
  icon: build/icon.png
  syncDesktopName: true
  category: Utility
  executableName: qual-hardware
  synopsis: Qualificação autônoma de hardware para cargas de inteligência artificial
  maintainer: Marcello Guimarães <marcellogmf66@gmail.com>
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  extraResources:
    - from: resources/calibration/linux-x64
      to: resources/calibration/linux-x64

appImage:
  artifactName: Qual-Hardware-${version}-linux-${arch}.${ext}

dmg:
  writeUpdateInfo: false

deb:
  artifactName: qual-hardware_${version}_amd64.${ext}

publish: null
